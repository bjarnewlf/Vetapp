<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>VetApp — Floating Tab Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── VetApp Design Tokens ── */
    :root {
      --color-primary:        #1B6B5A;
      --color-primary-light:  #E8F5F1;
      --color-primary-border: #B8DDD4;
      --color-primary-grad:   #3AA08A;
      --color-accent:         #CC6B3D;
      --color-background:     #FAF6F1;
      --color-surface:        #FFFFFF;
      --color-text:           #1A1A1A;
      --color-text-secondary: #6B6B6B;
      --color-text-light:     #999999;
      --color-border:         #E8E0D8;
      --color-border-light:   #F0EBE5;
      --color-error:          #D94040;
      --color-success:        #2E8B57;

      --font-heading: 'DM Sans', sans-serif;
      --font-body:    'Inter', sans-serif;
    }

    /* ── Page Background ── */
    body {
      background: #E5E5E5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      font-family: var(--font-body);
    }

    /* ── Device Frame ── */
    .device-frame {
      width: 375px;
      height: 812px;
      background: var(--color-background);
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 10px #1A1A1A,
        0 0 0 12px #3A3A3A,
        0 32px 64px rgba(0,0,0,0.35);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── Status Bar ── */
    .status-bar {
      height: 44px;
      background: var(--color-background);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .status-bar .time {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 15px;
      color: var(--color-text);
    }
    .status-bar .icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .status-bar .icons svg {
      width: 16px;
      height: 16px;
      fill: var(--color-text);
    }

    /* ── Screen Content ── */
    .screen {
      flex: 1;
      background: var(--color-background);
      padding: 24px 20px 0;
      position: relative;
      overflow: hidden;
    }

    /* ── Header ── */
    .greeting {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 24px;
      color: var(--color-text);
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .greeting-sub {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 24px;
    }

    /* ── Placeholder Cards ── */
    .card {
      background: var(--color-surface);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid var(--color-border-light);
      opacity: 0.7;
    }
    .card-shimmer {
      height: 12px;
      border-radius: 6px;
      background: var(--color-border-light);
      margin-bottom: 8px;
    }
    .card-shimmer.short { width: 60%; }
    .card-shimmer.medium { width: 80%; }
    .card-shimmer.full { width: 100%; margin-bottom: 0; }

    .card-top {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--color-primary-light);
      flex-shrink: 0;
    }
    .card-lines {
      flex: 1;
    }

    /* ── Bottom Safe Area ── */
    .bottom-safe {
      height: 34px;
      background: var(--color-background);
      flex-shrink: 0;
      position: relative;
    }

    /* ── Floating Tab Bar ── */
    .tab-bar {
      position: absolute;
      bottom: 16px;
      left: 20px;
      right: 20px;
      height: 64px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      border: 0.5px solid rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 8px;
    }

    /* ── Tab Item ── */
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      flex: 1;
      height: 100%;
      position: relative;
      cursor: pointer;
    }

    .tab-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab-icon svg {
      width: 22px;
      height: 22px;
    }

    .tab-label {
      font-family: var(--font-body);
      font-size: 10px;
      line-height: 1;
    }

    /* ── Inaktive Tabs ── */
    .tab-item .tab-icon svg { fill: none; }
    .tab-item .tab-label { color: var(--color-text-light); font-weight: 400; }
    .tab-item svg path,
    .tab-item svg circle,
    .tab-item svg rect,
    .tab-item svg polyline,
    .tab-item svg line { stroke: var(--color-text-light); }

    /* ── Aktiver Tab ── */
    .tab-item.active .tab-label {
      color: var(--color-accent);
      font-weight: 600;
    }
    .tab-item.active svg path,
    .tab-item.active svg circle,
    .tab-item.active svg rect,
    .tab-item.active svg polyline,
    .tab-item.active svg line {
      stroke: var(--color-accent);
    }
    /* Filled Icon fuer aktiven Tab */
    .tab-item.active .icon-filled {
      fill: var(--color-accent);
    }
    .tab-item.active .icon-filled path {
      stroke: none;
      fill: var(--color-accent);
    }

    /* Aktiver Dot */
    .tab-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-accent);
      position: absolute;
      bottom: 10px;
    }
    .tab-item:not(.active) .tab-dot { display: none; }

    /* ── Spec Label ── */
    .spec-label {
      position: absolute;
      bottom: -28px;
      left: 0;
      right: 0;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div style="position: relative;">
    <div class="device-frame">

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="icons">
          <!-- Signal -->
          <svg viewBox="0 0 24 24"><rect x="1" y="14" width="3" height="7" rx="0.5"/><rect x="6.5" y="10" width="3" height="11" rx="0.5"/><rect x="12" y="6" width="3" height="15" rx="0.5"/><rect x="17.5" y="2" width="3" height="19" rx="0.5"/></svg>
          <!-- WiFi -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"><path d="M1.5 9.5C5.5 5.5 10.5 3.5 12 3.5s6.5 2 10.5 6M5 13.5c1.8-1.8 4.3-3 7-3s5.2 1.2 7 3M8.5 17.5C9.6 16.4 10.7 16 12 16s2.4.4 3.5 1.5M12 21v-.5"/></svg>
          <!-- Battery -->
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="10" rx="2" stroke="#1A1A1A" stroke-width="1.5" fill="none"/><rect x="3" y="8" width="13" height="8" rx="1" fill="#1A1A1A"/><path d="M21 10v4" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
      </div>

      <!-- Screen -->
      <div class="screen">

        <!-- Greeting -->
        <p class="greeting">Hallo, Claas!</p>
        <p class="greeting-sub">Mittwoch, 7. April 2026</p>

        <!-- Placeholder Card 1 -->
        <div class="card">
          <div class="card-top">
            <div class="card-avatar"></div>
            <div class="card-lines">
              <div class="card-shimmer short"></div>
              <div class="card-shimmer medium"></div>
            </div>
          </div>
          <div class="card-shimmer full"></div>
        </div>

        <!-- Placeholder Card 2 -->
        <div class="card">
          <div class="card-top">
            <div class="card-avatar" style="background: #FFF3EC; border-radius: 12px;"></div>
            <div class="card-lines">
              <div class="card-shimmer short"></div>
              <div class="card-shimmer medium"></div>
            </div>
          </div>
          <div class="card-shimmer full"></div>
        </div>

        <!-- Placeholder Card 3 (kleiner) -->
        <div class="card" style="opacity: 0.4;">
          <div class="card-shimmer medium"></div>
          <div class="card-shimmer short"></div>
        </div>

      </div>

      <!-- Bottom Safe Area mit Tab Bar -->
      <div class="bottom-safe">
        <div class="tab-bar">

          <!-- Tab 1: Start (AKTIV) -->
          <div class="tab-item active">
            <div class="tab-icon">
              <!-- Haus-Icon gefuellt -->
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path class="icon-filled" d="M3 12L12 3L21 12V21H15V15H9V21H3V12Z" fill="#CC6B3D" stroke="none"/>
              </svg>
            </div>
            <span class="tab-label">Start</span>
            <div class="tab-dot"></div>
          </div>

          <!-- Tab 2: Tiere -->
          <div class="tab-item">
            <div class="tab-icon">
              <!-- Pfoten-Icon Outline -->
              <svg viewBox="0 0 24 24" fill="none" stroke="#999999" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="7" cy="8" r="2"/>
                <circle cx="17" cy="8" r="2"/>
                <circle cx="5" cy="13" r="1.5"/>
                <circle cx="19" cy="13" r="1.5"/>
                <path d="M12 10c-3 0-6 2.5-5.5 5.5C7 18 9 19.5 12 19.5s5-1.5 5.5-4c.5-3-2.5-5.5-5.5-5.5z"/>
              </svg>
            </div>
            <span class="tab-label">Tiere</span>
          </div>

          <!-- Tab 3: KI -->
          <div class="tab-item">
            <div class="tab-icon">
              <!-- Chat-Bubble-Icon Outline -->
              <svg viewBox="0 0 24 24" fill="none" stroke="#999999" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                <circle cx="9" cy="10" r="1" fill="#999999" stroke="none"/>
                <circle cx="12" cy="10" r="1" fill="#999999" stroke="none"/>
                <circle cx="15" cy="10" r="1" fill="#999999" stroke="none"/>
              </svg>
            </div>
            <span class="tab-label">KI</span>
          </div>

          <!-- Tab 4: Erinnern -->
          <div class="tab-item">
            <div class="tab-icon">
              <!-- Glocken-Icon Outline -->
              <svg viewBox="0 0 24 24" fill="none" stroke="#999999" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
            </div>
            <span class="tab-label">Erinnern</span>
          </div>

          <!-- Tab 5: Tierarzt -->
          <div class="tab-item">
            <div class="tab-icon">
              <!-- Kreuz/Medkit-Icon Outline -->
              <svg viewBox="0 0 24 24" fill="none" stroke="#999999" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="3"/>
                <path d="M12 8v8M8 12h8"/>
              </svg>
            </div>
            <span class="tab-label">Tierarzt</span>
          </div>

        </div>
      </div>

    </div>

    <p class="spec-label">Floating Tab Bar — VetApp Design System v2</p>
  </div>

</body>
</html>
