<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>VetApp — PetCard Karussell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── VetApp Design Tokens ── */
    :root {
      --color-primary:        #1B6B5A;
      --color-primary-light:  #E8F5F1;
      --color-accent:         #CC6B3D;
      --color-background:     #FAF6F1;
      --color-surface:        #FFFFFF;
      --color-text:           #1A1A1A;
      --color-text-secondary: #6B6B6B;
      --color-border:         #E8E0D8;
      --color-border-light:   #F0EBE5;
      --color-card-shadow:    rgba(0, 0, 0, 0.08);

      --font-heading: 'DM Sans', sans-serif;
      --font-body:    'Inter', sans-serif;

      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    /* ── Device Frame ── */
    body {
      background: #E5E5E5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      font-family: var(--font-body);
    }

    .device-frame {
      width: 375px;
      background: var(--color-background);
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 10px #1A1A1A,
        0 0 0 12px #3A3A3A,
        0 32px 64px rgba(0,0,0,0.35);
      position: relative;
    }

    /* Status Bar */
    .status-bar {
      height: 44px;
      background: var(--color-background);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .status-bar .time {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 15px;
      color: var(--color-text);
    }
    .status-bar .icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .status-bar .icons svg {
      width: 16px;
      height: 16px;
      fill: var(--color-text);
    }

    /* ── Screen Content ── */
    .screen {
      padding: 24px 20px 40px;
      background: var(--color-background);
    }

    /* ── Section Header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 22px;
      color: var(--color-text);
      letter-spacing: -0.3px;
    }
    .section-action {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 14px;
      color: var(--color-primary);
      text-decoration: none;
    }

    /* ── Pet Card Karussell ── */
    .carousel-container {
      margin: 0 -20px;
      padding: 4px 20px 8px;
      overflow-x: auto;
      display: flex;
      gap: 12px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .carousel-container::-webkit-scrollbar { display: none; }

    /* ── Pet Card ── */
    .pet-card {
      flex: 0 0 150px;
      width: 150px;
      height: 185px;
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: 0 2px 8px var(--color-card-shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 10px;
    }

    /* Partially visible hint card */
    .pet-card--hint {
      opacity: 0.75;
    }

    /* Pet Photo */
    .pet-photo-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }
    .pet-photo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Fallback-Foto wenn kein Bild */
    .pet-photo-fallback {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--color-primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .pet-photo-fallback svg {
      width: 40px;
      height: 40px;
      fill: var(--color-primary);
      opacity: 0.7;
    }

    .pet-name {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 16px;
      color: var(--color-text);
      text-align: center;
      line-height: 1.2;
    }
    .pet-meta {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 12px;
      color: var(--color-text-secondary);
      text-align: center;
      line-height: 1.3;
    }

    /* ── Separator ── */
    .separator {
      margin-top: 24px;
      height: 1px;
      background: var(--color-border-light);
    }

    /* ── Label ── */
    .spec-label {
      margin-top: 32px;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="device-frame">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="icons">
        <!-- Signal -->
        <svg viewBox="0 0 24 24"><rect x="1" y="14" width="3" height="7" rx="0.5"/><rect x="6.5" y="10" width="3" height="11" rx="0.5"/><rect x="12" y="6" width="3" height="15" rx="0.5"/><rect x="17.5" y="2" width="3" height="19" rx="0.5"/></svg>
        <!-- WiFi -->
        <svg viewBox="0 0 24 24"><path d="M1.5 9.5C5.5 5.5 10.5 3.5 12 3.5s6.5 2 10.5 6M5 13.5c1.8-1.8 4.3-3 7-3s5.2 1.2 7 3M8.5 17.5C9.6 16.4 10.7 16 12 16s2.4.4 3.5 1.5M12 21v-.5"/></svg>
        <!-- Battery -->
        <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="10" rx="2" stroke="#1A1A1A" stroke-width="1.5" fill="none"/><rect x="3" y="8" width="13" height="8" rx="1" fill="#1A1A1A"/><path d="M21 10v4" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>

    <!-- Screen Content -->
    <div class="screen">

      <!-- Section Header -->
      <div class="section-header">
        <span class="section-title">Meine Tiere</span>
        <a class="section-action" href="#">+ Hinzufuegen</a>
      </div>

      <!-- Karussell -->
      <div class="carousel-container">

        <!-- Card 1: Bella -->
        <div class="pet-card">
          <div class="pet-photo-wrapper">
            <!-- Golden Retriever via placedog -->
            <img src="https://placedog.net/80/80?id=1" alt="Bella" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <div class="pet-photo-fallback" style="display:none;">
              <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            </div>
          </div>
          <span class="pet-name">Bella</span>
          <span class="pet-meta">Hund · 3 Jahre</span>
        </div>

        <!-- Card 2: Milo -->
        <div class="pet-card">
          <div class="pet-photo-wrapper">
            <img src="https://placekitten.com/80/80" alt="Milo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <div class="pet-photo-fallback" style="display:none;">
              <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            </div>
          </div>
          <span class="pet-name">Milo</span>
          <span class="pet-meta">Katze · 5 Jahre</span>
        </div>

        <!-- Card 3: Hoppel (partial scroll hint) -->
        <div class="pet-card pet-card--hint">
          <div class="pet-photo-fallback" style="background: #FFF3EC;">
            <!-- Rabbit icon -->
            <svg viewBox="0 0 48 48" fill="none" style="width:40px;height:40px;">
              <ellipse cx="24" cy="30" rx="12" ry="10" fill="#CC6B3D" opacity="0.25"/>
              <ellipse cx="20" cy="20" rx="5" ry="10" fill="#CC6B3D" opacity="0.35"/>
              <ellipse cx="28" cy="20" rx="5" ry="10" fill="#CC6B3D" opacity="0.35"/>
              <ellipse cx="24" cy="29" rx="8" ry="7" fill="#CC6B3D" opacity="0.5"/>
              <circle cx="21" cy="27" r="1.5" fill="#1A1A1A" opacity="0.6"/>
              <circle cx="27" cy="27" r="1.5" fill="#1A1A1A" opacity="0.6"/>
              <ellipse cx="24" cy="31" rx="2" ry="1" fill="#CC6B3D" opacity="0.6"/>
            </svg>
          </div>
          <span class="pet-name">Hoppel</span>
          <span class="pet-meta">Hase · 2 Jahre</span>
        </div>

        <!-- Spacer fuer den Scroll-Effekt (zeigt dass mehr kommt) -->
        <div style="flex: 0 0 8px;"></div>

      </div>

      <!-- Separator -->
      <div class="separator"></div>

      <!-- Spec Label -->
      <p class="spec-label">PetCard Karussell — VetApp Design System v2</p>

    </div>
  </div>

</body>
</html>
